name: React CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: react-cicd-cluster
  DEPLOYMENT_NAME: react-app
  CONTAINER_NAME: react-container
  DOCKER_IMAGE: dhairyashil8416/cicd

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2 Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️Build & Push Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest

      # 4️Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 5️ Connect to EKS
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      # 6️Apply Kubernetes Files (only first time needed)
      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f deployment.yaml

      # 7️Update Deployment with New Image (AUTO UPDATE)
      - name: Update Image in EKS
        run: |
          kubectl set image deployment/$DEPLOYMENT_NAME \
          $CONTAINER_NAME=${DOCKER_IMAGE}:${{ github.sha }}

      # 8️ Wait for Rollout
      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/$DEPLOYMENT_NAME