name: React CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: react-cicd-cluster
  IMAGE_NAME: dhairyashil8416/cicd

# -------------------------
# 1️⃣ BUILD JOB
# -------------------------
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: set_tag
        run: echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.set_tag.outputs.image_tag }} .

      - name: Save Image as Artifact
        run: |
          docker save $IMAGE_NAME:${{ steps.set_tag.outputs.image_tag }} -o image.tar

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

# -------------------------
# 2️⃣ PUSH JOB
# -------------------------
  push:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ needs.build.outputs.image_tag }}
          docker tag $IMAGE_NAME:${{ needs.build.outputs.image_tag }} $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest

# -------------------------
# 3️⃣ DEPLOY JOB
# -------------------------
  deploy:
    needs: push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      - name: Update Image in Deployment
        run: |
          kubectl set image deployment/react-app react-container=$IMAGE_NAME:${{ needs.build.outputs.image_tag }}

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/react-app